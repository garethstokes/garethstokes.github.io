<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 210" width="480" height="210" font-family="monospace" role="img" aria-label="A single box labelled UserT f fans out to three faces: column metadata for building the table, a plain value for moving rows in and out, and a column reference for running a query. Choosing f picks the face.">
  <!-- the single source declaration -->
  <rect x="18" y="86" width="112" height="36" rx="3" fill="none" stroke="#22d3ee"/>
  <text x="74" y="109" fill="#22d3ee" font-size="14" text-anchor="middle">UserT f</text>
  <text x="74" y="136" fill="#666" font-size="9" text-anchor="middle">one declaration</text>

  <!-- choose f -->
  <text x="205" y="18" fill="#22d3ee" font-size="11" text-anchor="middle">choose f</text>

  <!-- fan from the source to three faces -->
  <g fill="none" stroke="#22d3ee" stroke-width="1.5">
    <path d="M130,100 C196,100 196,44 250,44"/>
    <path d="M130,104 L250,104"/>
    <path d="M130,108 C196,108 196,164 250,164"/>
  </g>
  <g fill="#22d3ee">
    <polygon points="256,44 248,40 248,48"/>
    <polygon points="256,104 248,100 248,108"/>
    <polygon points="256,164 248,160 248,168"/>
  </g>

  <!-- the three faces, in the order of the three jobs: build / move / query -->
  <g fill="none" stroke="#888">
    <rect x="262" y="29" width="120" height="30" rx="3"/>
    <rect x="262" y="89" width="120" height="30" rx="3"/>
    <rect x="262" y="149" width="120" height="30" rx="3"/>
  </g>
  <g fill="#e6e6e6" font-size="12" text-anchor="middle">
    <text x="322" y="48">column metadata</text>
    <text x="322" y="108">a plain value</text>
    <text x="322" y="168">a column ref</text>
  </g>
  <g fill="#666" font-size="9">
    <text x="390" y="48">build the table</text>
    <text x="390" y="108">rows in and out</text>
    <text x="390" y="168">run a query</text>
  </g>
</svg>
