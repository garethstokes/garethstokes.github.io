<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 220" width="470" height="220" font-family="monospace" role="img" aria-label="A single Codec sits in the centre. Its decode side lands on a Read type with every column populated, including id. Its encode side comes from a Write type with the id column missing, which the database fills. This is future work, not yet built.">
  <!-- centre codec -->
  <rect x="185" y="92" width="100" height="44" rx="3" fill="none" stroke="#22d3ee"/>
  <text x="235" y="112" fill="#22d3ee" font-size="13" text-anchor="middle">Codec</text>
  <text x="235" y="128" fill="#666" font-size="9" text-anchor="middle">dimap</text>

  <!-- decode side -> Read (top right) -->
  <text x="320" y="42" fill="#e6e6e6" font-size="10" text-anchor="middle">decode -&gt;</text>
  <line x1="285" y1="100" x2="356" y2="62" stroke="#22d3ee" stroke-width="1.5"/>
  <polygon points="362,59 353,57 354,65" fill="#22d3ee"/>
  <rect x="362" y="48" width="98" height="56" rx="3" fill="none" stroke="#888"/>
  <text x="411" y="68" fill="#e6e6e6" font-size="11" text-anchor="middle">Read</text>
  <text x="411" y="84" fill="#666" font-size="9" text-anchor="middle">id, name,</text>
  <text x="411" y="96" fill="#666" font-size="9" text-anchor="middle">email</text>

  <!-- encode side <- Write (bottom right) -->
  <text x="320" y="190" fill="#e6e6e6" font-size="10" text-anchor="middle">&lt;- encode</text>
  <line x1="356" y1="166" x2="285" y2="128" stroke="#22d3ee" stroke-width="1.5"/>
  <polygon points="291,128 282,126 283,134" fill="#22d3ee"/>
  <rect x="362" y="124" width="98" height="56" rx="3" fill="none" stroke="#888"/>
  <text x="411" y="144" fill="#e6e6e6" font-size="11" text-anchor="middle">Write</text>
  <text x="411" y="160" fill="#666" font-size="9" text-anchor="middle">name, email</text>
  <text x="411" y="172" fill="#888" font-size="9" text-anchor="middle">(no id yet)</text>

  <!-- bytes, left -->
  <rect x="10" y="92" width="80" height="44" rx="3" fill="none" stroke="#888"/>
  <text x="50" y="112" fill="#e6e6e6" font-size="11" text-anchor="middle">bytes</text>
  <text x="50" y="128" fill="#666" font-size="9" text-anchor="middle">Postgres</text>
  <line x1="90" y1="108" x2="179" y2="110" stroke="#888" stroke-width="1.5"/>
  <line x1="90" y1="120" x2="179" y2="118" stroke="#888" stroke-width="1.5"/>

  <!-- future work banner -->
  <line x1="10" y1="200" x2="460" y2="200" stroke="#333" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="235" y="214" fill="#666" font-size="9" text-anchor="middle">future-work shape: the database fills the missing id on write</text>
</svg>
