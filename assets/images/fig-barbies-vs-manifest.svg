<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160" font-family="monospace" role="img" aria-label="barbies' Person takes two parameters, a Wear knob for bare-or-covered and the functor f; manifest's UserT takes one parameter, f, because the Field type family handles erasure.">
  <!-- divider -->
  <line x1="240" y1="22" x2="240" y2="132" stroke="#333" stroke-width="1.5" stroke-dasharray="3 4"/>
  <text x="240" y="16" fill="#666" font-size="10" text-anchor="middle">vs</text>

  <!-- left: barbies, two parameters -->
  <text x="115" y="28" fill="#888" font-size="11" text-anchor="middle">barbies</text>
  <text x="50" y="72" fill="#e6e6e6" font-size="15">Person</text>
  <rect x="116" y="56" width="20" height="22" rx="3" fill="none" stroke="#22d3ee"/>
  <text x="126" y="72" fill="#22d3ee" font-size="13" text-anchor="middle">t</text>
  <rect x="142" y="56" width="20" height="22" rx="3" fill="none" stroke="#22d3ee"/>
  <text x="152" y="72" fill="#22d3ee" font-size="13" text-anchor="middle">f</text>
  <text x="105" y="104" fill="#e6e6e6" font-size="11" text-anchor="middle">two parameters</text>
  <text x="105" y="122" fill="#666" font-size="9" text-anchor="middle">Wear picks bare; f picks the functor</text>

  <!-- right: manifest, one parameter -->
  <text x="362" y="28" fill="#888" font-size="11" text-anchor="middle">manifest</text>
  <text x="300" y="72" fill="#e6e6e6" font-size="15">UserT</text>
  <rect x="356" y="56" width="20" height="22" rx="3" fill="none" stroke="#22d3ee"/>
  <text x="366" y="72" fill="#22d3ee" font-size="13" text-anchor="middle">f</text>
  <text x="360" y="104" fill="#e6e6e6" font-size="11" text-anchor="middle">one parameter</text>
  <text x="360" y="122" fill="#666" font-size="9" text-anchor="middle">the Field family erases for Identity</text>
</svg>
