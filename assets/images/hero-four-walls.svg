<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" width="480" height="180" font-family="monospace" role="img" aria-label="building network breaks through four walls">
  <!-- four walls -->
  <g fill="#2a2a2a" stroke="#444" stroke-width="1">
    <rect x="96"  y="34" width="9" height="112"/>
    <rect x="190" y="34" width="9" height="112"/>
    <rect x="284" y="34" width="9" height="112"/>
    <rect x="378" y="34" width="9" height="112"/>
  </g>
  <!-- wall labels, read bottom-to-top -->
  <g fill="#888" font-size="9">
    <text transform="translate(92,142) rotate(-90)">include-dirs</text>
    <text transform="translate(186,142) rotate(-90)">configure sdist</text>
    <text transform="translate(280,142) rotate(-90)">preproc scope</text>
    <text transform="translate(374,142) rotate(-90)">MIN_VERSION</text>
  </g>
  <!-- the aqua path punching through -->
  <defs>
    <marker id="ah2" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#22d3ee"/>
    </marker>
  </defs>
  <line x1="20" y1="90" x2="438" y2="90" stroke="#22d3ee" stroke-width="3" marker-end="url(#ah2)"/>
  <!-- pierce points -->
  <g fill="#22d3ee"><circle cx="100" cy="90" r="4"/><circle cx="194" cy="90" r="4"/><circle cx="288" cy="90" r="4"/><circle cx="382" cy="90" r="4"/></g>
  <text x="20" y="26" fill="#888" font-size="10">build network</text>
  <text x="430" y="118" fill="#22d3ee" font-size="11" text-anchor="middle">linked</text>
</svg>
