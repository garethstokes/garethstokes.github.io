<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160" font-family="monospace" role="img" aria-label="Maybe User, where Maybe wraps the whole record, becomes UserT Maybe, where Maybe sits in every field. Likewise a list of User becomes UserT of list, a column per field.">
  <!-- column headers -->
  <text x="120" y="28" fill="#888" font-size="10" text-anchor="middle">f around the whole record</text>
  <text x="362" y="28" fill="#888" font-size="10" text-anchor="middle">f inside every field</text>

  <!-- row 1: Maybe -->
  <text x="120" y="62" font-size="14" text-anchor="middle"><tspan fill="#22d3ee">Maybe</tspan><tspan fill="#e6e6e6"> User</tspan></text>
  <line x1="200" y1="57" x2="300" y2="57" stroke="#888" stroke-width="1.5"/>
  <polygon points="306,57 298,53 298,61" fill="#888"/>
  <text x="362" y="62" font-size="14" text-anchor="middle"><tspan fill="#e6e6e6">UserT </tspan><tspan fill="#22d3ee">Maybe</tspan></text>
  <text x="120" y="80" fill="#666" font-size="9" text-anchor="middle">a user, or nothing</text>
  <text x="362" y="80" fill="#666" font-size="9" text-anchor="middle">every field optional (a patch)</text>

  <!-- row 2: list -->
  <text x="120" y="118" font-size="14" text-anchor="middle"><tspan fill="#22d3ee">[</tspan><tspan fill="#e6e6e6">User</tspan><tspan fill="#22d3ee">]</tspan></text>
  <line x1="200" y1="113" x2="300" y2="113" stroke="#888" stroke-width="1.5"/>
  <polygon points="306,113 298,109 298,117" fill="#888"/>
  <text x="362" y="118" font-size="14" text-anchor="middle"><tspan fill="#e6e6e6">UserT </tspan><tspan fill="#22d3ee">[]</tspan></text>
  <text x="120" y="136" fill="#666" font-size="9" text-anchor="middle">many users</text>
  <text x="362" y="136" fill="#666" font-size="9" text-anchor="middle">every field a column</text>
</svg>
