<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 200" width="470" height="200" font-family="monospace" role="img" aria-label="In another language the session keeps watching one mutable object that is edited in place; in Haskell the edit produces a new value u-prime, leaving u untouched, and save hands the new value back to the session, so identity is carried by the primary key.">
  <!-- divider -->
  <line x1="235" y1="24" x2="235" y2="170" stroke="#333" stroke-width="1.5" stroke-dasharray="3 4"/>
  <text x="235" y="16" fill="#666" font-size="10" text-anchor="middle">vs</text>

  <!-- left: mutate in place, session watches -->
  <text x="112" y="30" fill="#888" font-size="11" text-anchor="middle">another language</text>
  <rect x="48" y="48" width="86" height="26" rx="3" fill="none" stroke="#888"/>
  <text x="91" y="65" fill="#888" font-size="11" text-anchor="middle">Session</text>
  <rect x="60" y="112" width="62" height="26" rx="3" fill="none" stroke="#e6e6e6"/>
  <text x="91" y="129" fill="#e6e6e6" font-size="12" text-anchor="middle">obj</text>
  <!-- watches arrow: session to the one object, dashed -->
  <line x1="91" y1="74" x2="91" y2="106" stroke="#888" stroke-width="1.5" stroke-dasharray="3 4"/>
  <polygon points="91,112 87,104 95,104" fill="#888"/>
  <text x="150" y="93" fill="#666" font-size="9" text-anchor="middle">watches</text>
  <text x="91" y="156" fill="#666" font-size="9" text-anchor="middle">edited in place</text>

  <!-- right: handback, new value -->
  <text x="358" y="30" fill="#888" font-size="11" text-anchor="middle">Haskell</text>
  <rect x="296" y="48" width="86" height="26" rx="3" fill="none" stroke="#22d3ee"/>
  <text x="339" y="65" fill="#22d3ee" font-size="11" text-anchor="middle">Session</text>
  <!-- u unchanged -->
  <rect x="276" y="112" width="50" height="26" rx="3" fill="none" stroke="#666"/>
  <text x="301" y="129" fill="#666" font-size="12" text-anchor="middle">u</text>
  <text x="301" y="156" fill="#666" font-size="9" text-anchor="middle">untouched</text>
  <!-- u' new -->
  <rect x="356" y="112" width="50" height="26" rx="3" fill="none" stroke="#e6e6e6"/>
  <text x="381" y="129" fill="#e6e6e6" font-size="12" text-anchor="middle">u'</text>
  <!-- save hands u' back up to session -->
  <line x1="381" y1="112" x2="368" y2="80" stroke="#22d3ee" stroke-width="1.5"/>
  <polygon points="366,74 372,82 363,83" fill="#22d3ee"/>
  <text x="408" y="100" fill="#22d3ee" font-size="9" text-anchor="middle">save</text>

  <text x="235" y="190" fill="#666" font-size="9" text-anchor="middle">no hidden state to watch, so identity is the primary key</text>
</svg>
