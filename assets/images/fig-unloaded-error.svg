<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 178" width="470" height="178" font-family="monospace" role="img" aria-label="Reading posts on an entity that never loaded them fails to compile. The type-list wall GHC would print is shown muted and struck through; in its place manifest prints one written sentence in the accent colour saying the relation is not loaded and how to load it.">
  <!-- the offending read -->
  <rect x="120" y="12" width="230" height="28" rx="3" fill="none" stroke="#e6e6e6"/>
  <text x="235" y="31" fill="#e6e6e6" font-size="12" text-anchor="middle">posts u   (u never loaded posts)</text>

  <line x1="235" y1="40" x2="235" y2="58" stroke="#22d3ee" stroke-width="1.5"/>
  <polygon points="235,64 231,56 239,56" fill="#22d3ee"/>
  <text x="307" y="54" fill="#666" font-size="9" text-anchor="middle">compile-time check</text>

  <!-- the wall it would print, muted and struck through -->
  <text x="20" y="84" fill="#666" font-size="9">the type-list wall it would print:</text>
  <text x="24" y="100" fill="#666" font-size="9" opacity="0.8">Couldn't match type 'Member "posts" '[] with 'True ...</text>

  <!-- the sentence manifest prints instead -->
  <rect x="20" y="112" width="430" height="50" rx="3" fill="none" stroke="#22d3ee"/>
  <text x="235" y="134" fill="#22d3ee" font-size="11" text-anchor="middle">Relation 'posts' is not loaded on this User.</text>
  <text x="235" y="152" fill="#22d3ee" font-size="11" text-anchor="middle">Add with (selectin #posts), or call load #posts u.</text>
</svg>
