<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 230" width="480" height="230" font-family="monospace" role="img" aria-label="A ladder whose rungs, from bottom to top, read functions and composition, functors, higher-kinded types, applicative and profunctor, monads, and type families; an arrow climbs toward the top rung where the opening signature becomes readable.">
  <!-- climbing arrow -->
  <line x1="22" y1="206" x2="22" y2="30" stroke="#22d3ee" stroke-width="1.5"/>
  <polygon points="22,22 18,32 26,32" fill="#22d3ee"/>

  <!-- ladder rails -->
  <line x1="44" y1="30" x2="44" y2="210" stroke="#888" stroke-width="1.5"/>
  <line x1="72" y1="30" x2="72" y2="210" stroke="#888" stroke-width="1.5"/>

  <!-- rungs (bottom -> top), top rung in accent -->
  <g stroke="#888" stroke-width="1.5">
    <line x1="44" y1="198" x2="72" y2="198"/>
    <line x1="44" y1="168" x2="72" y2="168"/>
    <line x1="44" y1="138" x2="72" y2="138"/>
    <line x1="44" y1="108" x2="72" y2="108"/>
    <line x1="44" y1="78"  x2="72" y2="78"/>
  </g>
  <line x1="44" y1="48" x2="72" y2="48" stroke="#22d3ee" stroke-width="1.5"/>

  <!-- rung labels -->
  <g fill="#e6e6e6" font-size="11">
    <text x="84" y="202">functions and composition</text>
    <text x="84" y="172">functors</text>
    <text x="84" y="142">higher-kinded types</text>
    <text x="84" y="112">applicative, profunctor</text>
    <text x="84" y="82">monads</text>
  </g>
  <text x="84" y="52" fill="#22d3ee" font-size="11">type families</text>
  <text x="84" y="28" fill="#666" font-size="9">and the opening signature reads itself</text>
</svg>
