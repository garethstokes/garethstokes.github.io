<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 210" width="440" height="210" font-family="monospace" role="img" aria-label="cabal's version solver versus zinc's pinned chain">
  <!-- LEFT: the solver's tangle -->
  <g stroke="#888" stroke-width="1.5" fill="none" opacity="0.85">
    <path d="M40,46 C90,30 120,70 150,52"/>
    <path d="M40,46 C50,90 100,100 70,120"/>
    <path d="M150,52 C160,90 110,110 120,134"/>
    <path d="M70,120 C90,140 110,128 120,134"/>
    <path d="M40,46 C80,80 130,70 120,134"/>
    <path d="M150,52 C120,90 90,80 70,120"/>
  </g>
  <g fill="#888">
    <circle cx="40" cy="46" r="6"/><circle cx="150" cy="52" r="6"/>
    <circle cx="70" cy="120" r="6"/><circle cx="120" cy="134" r="6"/>
    <circle cx="100" cy="86" r="6"/>
  </g>
  <g fill="#666" font-size="9">
    <text x="78" y="34">&gt;=1.2 &lt;2</text>
    <text x="34" y="92">^0.6</text>
    <text x="128" y="100">==1.*</text>
  </g>
  <text x="92" y="92" fill="#555" font-size="34" text-anchor="middle">?</text>
  <text x="95" y="184" fill="#888" font-size="11" text-anchor="middle">cabal: search for an assignment</text>

  <!-- divider -->
  <line x1="215" y1="24" x2="215" y2="160" stroke="#333" stroke-width="1.5" stroke-dasharray="3 4"/>
  <text x="215" y="16" fill="#666" font-size="10" text-anchor="middle">vs</text>

  <!-- RIGHT: the pinned chain -->
  <line x1="262" y1="46" x2="262" y2="150" stroke="#22d3ee" stroke-width="1.5"/>
  <g stroke="#22d3ee" fill="none">
    <rect x="270" y="34" width="150" height="24" rx="2"/>
    <rect x="270" y="70" width="150" height="24" rx="2"/>
    <rect x="270" y="106" width="150" height="24" rx="2"/>
    <rect x="270" y="142" width="150" height="24" rx="2"/>
  </g>
  <g fill="#22d3ee"><circle cx="262" cy="46" r="3"/><circle cx="262" cy="82" r="3"/><circle cx="262" cy="118" r="3"/><circle cx="262" cy="154" r="3"/></g>
  <g fill="#e6e6e6" font-size="11">
    <text x="280" y="50">aeson    a1b2c3d</text>
    <text x="280" y="86">text     9f4e0b1</text>
    <text x="280" y="122">vector   c70d2aa</text>
    <text x="280" y="158">network  3e1f8c4</text>
  </g>
  <text x="345" y="184" fill="#22d3ee" font-size="11" text-anchor="middle">zinc: one pinned commit each</text>
</svg>
