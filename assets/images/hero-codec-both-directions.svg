<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 200" width="470" height="200" font-family="monospace" role="img" aria-label="A single Codec box wraps one column. A decode arrow runs from the column out to a User value; an encode arrow runs from the User value back into the column. One description, both directions.">
  <!-- the column, centre -->
  <rect x="175" y="78" width="120" height="44" rx="3" fill="none" stroke="#22d3ee"/>
  <text x="235" y="98" fill="#22d3ee" font-size="13" text-anchor="middle">Codec</text>
  <text x="235" y="114" fill="#666" font-size="9" text-anchor="middle">one column</text>

  <!-- decode: column -> value (top) -->
  <text x="235" y="40" fill="#e6e6e6" font-size="10" text-anchor="middle">decode -&gt;</text>
  <line x1="175" y1="84" x2="100" y2="60" stroke="#888" stroke-width="1.5"/>
  <line x1="295" y1="84" x2="370" y2="60" stroke="#22d3ee" stroke-width="1.5"/>
  <polygon points="376,58 367,55 369,63" fill="#22d3ee"/>

  <!-- encode: value -> column (bottom) -->
  <text x="235" y="170" fill="#e6e6e6" font-size="10" text-anchor="middle">&lt;- encode</text>
  <line x1="370" y1="140" x2="295" y2="116" stroke="#888" stroke-width="1.5"/>
  <line x1="100" y1="140" x2="175" y2="116" stroke="#22d3ee" stroke-width="1.5"/>
  <polygon points="169,116 178,113 176,121" fill="#22d3ee"/>

  <!-- the bytes box, left -->
  <rect x="20" y="78" width="80" height="44" rx="3" fill="none" stroke="#888"/>
  <text x="60" y="98" fill="#e6e6e6" font-size="11" text-anchor="middle">bytes</text>
  <text x="60" y="114" fill="#666" font-size="9" text-anchor="middle">Postgres</text>

  <!-- the value box, right -->
  <rect x="370" y="78" width="80" height="44" rx="3" fill="none" stroke="#888"/>
  <text x="410" y="98" fill="#e6e6e6" font-size="11" text-anchor="middle">User</text>
  <text x="410" y="114" fill="#666" font-size="9" text-anchor="middle">the value</text>
</svg>
