<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 210" width="470" height="210" font-family="monospace" role="img" aria-label="The field type Field f of Pk Int branches at two gates: through the Identity gate it emerges as a bare Int, the value you hold; through the Exposed gate it keeps its PrimaryKey and Serial markers for the schema deriver">
  <!-- source: the marker-laden field, f still abstract -->
  <rect x="16" y="82" width="152" height="42" rx="3" fill="none" stroke="#888"/>
  <text x="92" y="100" fill="#e6e6e6" font-size="12" text-anchor="middle">Field f (Pk Int)</text>
  <text x="92" y="116" fill="#666" font-size="9" text-anchor="middle">PrimaryKey (Serial Int)</text>

  <!-- branch to the two gates -->
  <path d="M168,98 C212,98 212,52 250,52" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <path d="M168,110 C212,110 212,156 250,156" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="3 4"/>

  <!-- Identity gate (top): erases to a bare value -->
  <text x="250" y="30" fill="#22d3ee" font-size="10" text-anchor="middle">f = Identity</text>
  <line x1="250" y1="38" x2="250" y2="66" stroke="#22d3ee" stroke-width="2"/>
  <line x1="250" y1="52" x2="299" y2="52" stroke="#22d3ee" stroke-width="1.5"/>
  <polygon points="305,52 297,48 297,56" fill="#22d3ee"/>
  <rect x="311" y="38" width="120" height="28" rx="3" fill="none" stroke="#22d3ee"/>
  <text x="371" y="56" fill="#22d3ee" font-size="13" text-anchor="middle">userId :: Int</text>
  <text x="371" y="82" fill="#888" font-size="9" text-anchor="middle">the value you hold</text>

  <!-- Exposed gate (bottom): keeps the markers -->
  <text x="371" y="132" fill="#666" font-size="9" text-anchor="middle">markers kept for the deriver</text>
  <line x1="250" y1="142" x2="250" y2="170" stroke="#888" stroke-width="2"/>
  <line x1="250" y1="156" x2="299" y2="156" stroke="#888" stroke-width="1.5"/>
  <polygon points="305,156 297,152 297,160" fill="#888"/>
  <rect x="311" y="142" width="150" height="28" rx="3" fill="none" stroke="#888"/>
  <text x="386" y="160" fill="#e6e6e6" font-size="11" text-anchor="middle">Exposed (Pk Int)</text>
  <text x="250" y="186" fill="#888" font-size="10" text-anchor="middle">f = Exposed</text>
</svg>
