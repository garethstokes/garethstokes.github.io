<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 214" width="470" height="214" font-family="monospace" role="img" aria-label="Two parallel tracks on a grid. On the value track, get u becomes a loaded entity under with #posts. On the type track below, its shadow, Ent of empty list becomes Ent of the list holding posts under Insert posts. Dashed lines tie each value box to the type box beneath it; the two tracks move in step.">
  <!-- row labels -->
  <text x="62" y="50" fill="#888" font-size="10" text-anchor="end">value</text>
  <text x="62" y="146" fill="#888" font-size="10" text-anchor="end">type</text>

  <!-- value row -->
  <rect x="72" y="30" width="144" height="32" rx="3" fill="none" stroke="#e6e6e6"/>
  <text x="144" y="50" fill="#e6e6e6" font-size="12" text-anchor="middle">get u</text>
  <rect x="296" y="30" width="144" height="32" rx="3" fill="none" stroke="#e6e6e6"/>
  <text x="368" y="50" fill="#e6e6e6" font-size="12" text-anchor="middle">a loaded entity</text>
  <line x1="216" y1="46" x2="289" y2="46" stroke="#22d3ee" stroke-width="1.5"/>
  <polygon points="295,46 287,42 287,50" fill="#22d3ee"/>
  <text x="256" y="36" fill="#22d3ee" font-size="9" text-anchor="middle">with #posts</text>

  <!-- ties -->
  <line x1="144" y1="62" x2="144" y2="124" stroke="#333" stroke-width="1" stroke-dasharray="3 4"/>
  <line x1="368" y1="62" x2="368" y2="124" stroke="#333" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="256" y="97" fill="#666" font-size="9" text-anchor="middle">in step</text>

  <!-- type row -->
  <rect x="72" y="124" width="144" height="32" rx="3" fill="none" stroke="#888"/>
  <text x="144" y="144" fill="#22d3ee" font-size="13" text-anchor="middle">Ent '[] a</text>
  <rect x="296" y="124" width="144" height="32" rx="3" fill="none" stroke="#888"/>
  <text x="368" y="144" fill="#22d3ee" font-size="13" text-anchor="middle">Ent '["posts"] a</text>
  <line x1="216" y1="140" x2="289" y2="140" stroke="#22d3ee" stroke-width="1.5"/>
  <polygon points="295,140 287,136 287,144" fill="#22d3ee"/>
  <text x="256" y="130" fill="#22d3ee" font-size="9" text-anchor="middle">Insert "posts"</text>

  <!-- under-box notes -->
  <text x="144" y="174" fill="#666" font-size="9" text-anchor="middle">nothing loaded</text>
  <text x="368" y="174" fill="#666" font-size="9" text-anchor="middle">posts in the set</text>

  <text x="256" y="200" fill="#666" font-size="9" text-anchor="middle">the same move from the start of the series, one level up</text>
</svg>
